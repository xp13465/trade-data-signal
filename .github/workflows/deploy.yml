# Cloudflare Pages 部署 —— 仅部署静态文件（数据采集在国内本地跑）。
# 触发：push 到 main 分支且 static-site/ 有改动时。
# 数据更新流程：本地跑 export.py → git add static-site/data/ → git push → 自动部署。
#
# 需在 GitHub repo Settings → Secrets 配置：
#   CLOUDFLARE_API_TOKEN  — Cloudflare API Token（Pages:Edit 权限）
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare Account ID
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'static-site/**'
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: sentiment-dashboard
          directory: static-site
          # 纯静态，无需构建命令
