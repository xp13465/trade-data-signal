  # symbol 映射：.DJI=道琼斯 / .IXIC=纳斯达克 / .INX=标普500。
  # 返 2004 起 ~5600 行全量历史，列 date/open/high/low/close/volume/amount（英文小写，
  # collect_index 通用路径已兼容）。近端 amount=0（仅 volume），无碍。
  - {id: us_dji,   name: 道琼斯,     market: global, func: index_us_stock_sina, symbol: ".DJI",  enabled: true}
