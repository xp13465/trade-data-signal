  - {id: cyb,      name: 创业板指, market: a, func: stock_zh_index_daily, symbol: "sz399006"}
  - {id: kc50,     name: 科创50,   market: a, func: stock_zh_index_daily, symbol: "sh000688"}
  # 红利指数：中证红利/红利低波走中证指数公司源（sina sh000922 数据停在 2019、930955 sina 无此代码），
  # 深证红利走 sina 源。market=a 复用 A 股看板 renderAStock 自动渲染折线 + E1 买卖点。
  - {id: csi_div,   name: 中证红利, market: a, func: stock_zh_index_hist_csindex, symbol: "000922"}
  - {id: div_lowvol, name: 红利低波, market: a, func: stock_zh_index_hist_csindex, symbol: "930955"}
  - {id: sz_div,    name: 深证红利, market: a, func: stock_zh_index_daily, symbol: "sz399324"}
