  - {id: hstech,   name: 恒生科技, market: hk, func: stock_hk_index_daily_sina, symbol: HSTECH}
  - {id: hscei,    name: 恒生国企, market: hk, func: stock_hk_index_daily_sina, symbol: HSCEI}
  # 美股指数：新浪 index_us_stock_sina（trust_env=False 直连可访问，无需代理）。
  # symbol 映射：.DJI=道琼斯 / .IXIC=纳斯达克 / .INX=标普500。
  # 返 2004 起 ~5600 行全量历史，列 date/open/high/low/close/volume/amount（英文小写，
  # collect_index 通用路径已兼容）。近端 amount=0（仅 volume），无碍。
  - {id: us_dji,   name: 道琼斯,     market: global, func: index_us_stock_sina, symbol: ".DJI",  enabled: true}
  - {id: us_ixic,  name: 纳斯达克,   market: global, func: index_us_stock_sina, symbol: ".IXIC", enabled: true}
  - {id: us_spx,   name: 标普500,    market: global, func: index_us_stock_sina, symbol: ".INX",   enabled: true}
  # 纳斯达克100（.NDX）：100只非金融大盘股，与 .IXIC（全市场）互补，科技龙头集中度更高。
  # 走同一新浪源 index_us_stock_sina，trust_env=False 直连可访问（与 us_dji/us_ixic/us_spx 一致）。
  - {id: us_ndx,   name: 纳斯达克100, market: global, func: index_us_stock_sina, symbol: ".NDX",   enabled: true}
  # 申万一级行业指数（31 个）—— F1。源 swsresearch.com（本地 DNS 失败，base.py 已 monkey-patch
  # socket.getaddrinfo 走 8.8.8.8 解析的 IP）。index_hist_sw 返全量历史（1999 起），无 start/end 参数。
  # market=industry 进 /api/industry；signals.py 自动遍历 cfg["indices"] 算 E1 买卖点。
  - {id: sw_801010, name: "SW 农林牧渔", market: industry, func: index_hist_sw, symbol: "801010"}
  - {id: sw_801030, name: "SW 基础化工", market: industry, func: index_hist_sw, symbol: "801030", buy_aux_filter: close_above_bl_2pct}
  - {id: sw_801040, name: "SW 钢铁",     market: industry, func: index_hist_sw, symbol: "801040"}
  - {id: sw_801050, name: "SW 有色金属", market: industry, func: index_hist_sw, symbol: "801050"}
  - {id: sw_801080, name: "SW 电子",     market: industry, func: index_hist_sw, symbol: "801080"}
  - {id: sw_801880, name: "SW 汽车",     market: industry, func: index_hist_sw, symbol: "801880"}
  # buy_aux_filter（可选）= 该指数 buy_aux 辅买点的 per-index 增强过滤（2026-07-05 加）。
  # 配置化的品类叠加增强条件，未配置的走基线 B1（BB 下轨回归）。后续逐品类验证后各自加方案。
  # 当前取值：
  #   'rsi_cross_40' = RSI(14) 上穿40 确认（rp≤40 & r>40），与 C1 上穿30 对称，
  #     价格反弹 + 动量转升双维确认。sw_801110 家电 f -38%→+16% 转正（14-家电buy_aux优化回测.md）；
  #     sw_801140 轻工 f -25%→-14% 未转正但胜率 45%→50% 退而求其次（16-行业批量回测）。
  #     csi1000 中证1000 f -19.5%→+3.47% 三 horizon 一致转正（5d/10d/20d 全 f>0），
  #       胜率 49.3%→47.4%，盈亏比 0.74→1.20，n 71→19（17-A股宽基buy_aux回测-sh-csi1000-hs300.md）。
  #   'close_above_bl_2pct' = 反弹力度确认（close > bl × 1.02），过滤 barely-crossed 假信号。
  #     sw_801030 基础化工 f -21%→+20% 转正，三 horizon 一致，n=19<30 样本警示（16-行业批量回测）。
  - {id: sw_801110, name: "SW 家用电器", market: industry, func: index_hist_sw, symbol: "801110", buy_aux_filter: rsi_cross_40}
