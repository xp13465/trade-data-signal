    <h1>信号实验室 · tdsignal</h1>
    <p><strong>tdsignal（信号实验室）</strong>是 A股/港股/全球盘后复盘情绪数据看板。每日收盘后采集市场情绪、宽度、资金、结构类指标，计算综合情绪分与跨市场评分，在指数图上标注技术分析参考点，辅助判断市场情绪拐点（冰点/过热）。</p>

      <li>期货机构净多空持仓（中金所 IF/IC/IH/IM）+ 同向/逆向准确率</li>
      <li>82品种技术分析参考点模拟回测</li>
